<style>
.company-page{background:#f5f5f0;min-height:100vh;color:#1a1a1a}
.company-bar{
  background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 0 rgba(0,0,0,.08);position:sticky;top:0;z-index:10;
}
.company-bar img{height:30px;width:auto}
.company-bar a{font-size:12.5px;font-weight:900;color:#555;text-decoration:none}
.company-main{max-width:680px;margin:0 auto;padding:36px 18px 56px}
.company-title{text-align:center;margin:0 0 6px;font-family:"M PLUS 1p",sans-serif}
.company-title .en{display:block;font-size:12px;font-weight:900;letter-spacing:.18em;color:#e60012;margin-bottom:6px}
.company-title .ja{font-size:26px;font-weight:900;color:#111}
.company-title .bar{width:48px;height:3px;background:#e60012;margin:14px auto 0}
.company-table{
  width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;
  margin:30px 0 0;box-shadow:0 3px 0 rgba(0,0,0,.06),0 14px 30px -18px rgba(0,0,0,.2);
}
.company-table th,.company-table td{
  text-align:left;padding:16px 16px;font-size:13.5px;line-height:1.7;vertical-align:top;
  border-bottom:1px solid #ececec;
}
.company-table tr:last-child th,.company-table tr:last-child td{border-bottom:0}
.company-table th{
  width:38%;background:#fafaf7;color:#333;font-weight:900;white-space:nowrap;
}
.company-table td{color:#222;font-weight:700}
.company-table td b{font-weight:900}
.company-map{margin:30px 0 0}
.company-map h2{font-size:15px;font-weight:900;color:#111;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.company-map h2::before{content:"";width:5px;height:18px;background:#e60012;border-radius:2px}
.company-map .map-frame{
  width:100%;aspect-ratio:16/10;border:0;border-radius:12px;display:block;
  box-shadow:0 3px 0 rgba(0,0,0,.06);
}
.company-foot{text-align:center;margin:36px 0 0}
.company-foot a{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,#fff14a 0%,#ffd400 50%,#f0b400 100%);
  color:#111;border:2.5px solid #111;border-radius:12px;
  padding:14px 28px;font-size:15px;font-weight:900;text-decoration:none;box-shadow:0 5px 0 #8a6a00;
}
.company-copy{text-align:center;font-size:11px;color:#999;font-weight:700;margin:26px 0 0}
@media (max-width:374px){
  .company-table th{width:42%}
  .company-table th,.company-table td{padding:13px 11px;font-size:12.5px}
}
</style>
